name: 发推 X

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: '推文内容'
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install twikit

      - name: 发推
        run: python post_to_x.py
        env:
          TWEET_TEXT: ${{ inputs.tweet_text }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_KDT: ${{ secrets.X_KDT }}
          LANG: C.UTF-8
          PYTHONIOENCODING: utf-8

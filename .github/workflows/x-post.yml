name: Post to X

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: text
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install twikit -q
      - name: post
        shell: bash
        env:
          TWEET_TEXT: ${{ inputs.tweet_text }}
          AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          CT0: ${{ secrets.X_CT0 }}
          KDT: ${{ secrets.X_KDT }}
        run: |
          python3 << 'PYEOF'
          import asyncio, logging, os, sys
          logging.disable(logging.CRITICAL)
          os.environ["PYTHONWARNINGS"] = "ignore"
          sys.stdout = open("/proc/self/fd/1", "w", encoding="utf-8")
          sys.stderr = open("/proc/self/fd/2", "w", encoding="utf-8")
          from twikit import Client

          text = os.environ["TWEET_TEXT"]
          cookies = {"auth_token": os.environ["AUTH_TOKEN"], "ct0": os.environ["CT0"]}
          if os.environ.get("KDT"): cookies["kdt"] = os.environ["KDT"]

          async def post():
              c = Client(language="en-US")
              c.set_cookies(cookies)
              t = await c.create_tweet(text=text[:280])
              return t.id

          try:
              tid = asyncio.run(post())
              print(f"OK tweet_id={tid}")
              print(f"URL=https://x.com/user/status/{tid}")
          except Exception as e:
              print(f"ERROR: {e}")
              exit(1)
          PYEOF

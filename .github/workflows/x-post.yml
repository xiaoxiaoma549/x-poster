name: Post to X

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: text
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install twikit -q
      - name: test
        shell: bash
        env:
          AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          CT0: ${{ secrets.X_CT0 }}
        run: |
          python3 << 'PYEOF'
          import os, sys, asyncio
          sys.stdout = open("/proc/self/fd/1", "w", encoding="utf-8")
          sys.stderr = open("/proc/self/fd/2", "w", encoding="utf-8")
          print("importing...", flush=True)
          from twikit import Client
          print("twikit loaded", flush=True)
          async def test():
              c = Client(language="en-US")
              c.set_cookies({"auth_token": os.environ["AUTH_TOKEN"], "ct0": os.environ["CT0"]})
              u = await c.user("XugangH")
              print(f"user: {u.name}", flush=True)
          asyncio.run(test())
          PYEOF

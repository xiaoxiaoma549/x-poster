name: Post to X

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: text
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install twikit --upgrade -q
      - name: post
        shell: bash
        env:
          TWEET_TEXT: ${{ inputs.tweet_text }}
          AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          CT0: ${{ secrets.X_CT0 }}
          KDT: ${{ secrets.X_KDT }}
        run: python3 post_to_x.py

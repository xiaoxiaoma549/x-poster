name: Debug twikit

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: text
        required: true
        type: string

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - run: locale
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install twikit
      - name: test
        shell: bash
        env:
          TWEET_TEXT: ${{ inputs.tweet_text }}
          AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          CT0: ${{ secrets.X_CT0 }}
          KDT: ${{ secrets.X_KDT }}
        run: |
          python3 -c "
          import os,sys
          print('stdout encoding:', sys.stdout.encoding)
          print('stderr encoding:', sys.stderr.encoding)
          print('PYTHONUTF8 flag:', sys.flags.utf8_mode)
          print('locale:', __import__('locale').getpreferredencoding())
          text = os.environ.get('TWEET_TEXT','')
          print('tweet text:', repr(text[:50]))
          print('Is pure ASCII:', all(ord(c) < 128 for c in text))
          "
